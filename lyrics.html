<!DOCTYPE html>
<html>
    <head>
        <title>PAT SONG</title>
        <link rel="icon" type="image/jpg" href="images/transform.jpg">
    </head>
    <body>
        
        <p><div style="background-color: cornflowerblue;">If a leopard never changes its spots</div></p>

       
        <ul style="background-color: lightgreen; border: 3px salmon; border-radius: 0.2cm; box-shadow: 1cm;">
            <li>
                <a href="https://www.youtube.com/results?search_query=transform+daniel+caesar">
                    Youtube
                </a>
            </li>
            <li>
                <a href="nextp.html">
                    <button style="background-color: beige; font-size: smaller; border-radius: 5px; border-color: deeppink;"
                    title="Add to liked songs">
                        Spotify
                    </button>
                </a>
            </li>
            <li>Apple Music</li>
        </ul>
        <table border="1" style="background-color: black;" >
            <tr style="background-color: bisque;">
                <th width="10" align="center">Song title</th>
                <th align="center">Release Date</th>
            </tr>
            <tr style="background-color: lightgreen;">
                <td align="center">Replace</td>
                <td align="center">2017<td>
            </tr>
        </table>
        

        <form>

            <label for="favn">Code number:</label>
            <input type="number" id="favn" min="0" max="10000000000" required><br>

            <label for="title">Title:</label>

            <label for="Mr.">Mr.</label>
            <input type="radio" id="Mr." value="Mr." name="title">

            <label for="payment">Payment method</label><br>
            <select id="payment">
                <option value="visa">Visa</option>
                <option value="mastercard">Mastercard</option>
            </select>
            <input type="submit">
            <input type="reset">
        </form>
    </body>
</html>
